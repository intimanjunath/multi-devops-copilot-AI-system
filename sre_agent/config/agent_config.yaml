# Agent Configuration - Maps agents to their respective tools
# Each agent specializes in a specific domain with appropriate tools

agents:
  kubernetes_agent:
    name: "Kubernetes Infrastructure Agent"
    description: "Manages Kubernetes cluster operations and monitoring"
    tools:
      - check_k8s_health
      - get_pod_status
      - list_namespaces
      - list_pods
      - list_services
      - list_deployments
      - list_events
      - get_service_endpoints
      - get_pod_logs
      - get_deployment_status
      - get_node_status

  logs_agent:
    name: "Application Logs Agent"
    description: "Handles application log analysis and searching"
    tools:
      - query_logs
      - get_error_logs
      - analyze_log_patterns

  metrics_agent:
    name: "Performance Metrics Agent"
    description: "Provides application performance and resource metrics"
    tools:
      - check_prometheus_health
      - get_metric
      - get_metric_range
      - get_golden_signals

  runbooks_agent:
    name: "Operational Runbooks Agent"
    description: "Provides operational procedures and troubleshooting guides"
    tools:
      - search_runbooks
      - get_incident_playbook
      - get_troubleshooting_guide
      - get_escalation_procedures
      - get_common_resolutions

  github_agent:
    name: "Code Change Intelligence Agent"
    description: "Correlates code changes (commits, PRs) with incidents and identifies bad commits"
    tools:
      - list_commits
      - get_commit
      - list_pull_requests
      - get_pull_request
      - create_revert_pr
      - comment_on_pr
      - revert_pr

# Global tools available to all agents
# Tools are now discovered from MCP servers (K8s, Logs, Metrics, Runbooks, GitHub, Memory)
global_tools: []

